<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matías - Acceso Administrador</title>
    <script>
        // Check if the current user is logged in as admin
        const currentUser = JSON.parse(localStorage.getItem('matias_currentUser') || 'null');
        if (currentUser && currentUser.role === 'admin') {
            // Redirect to admin panel on the main site
            window.location.href = '../#admin';
        } else {
            // Display denial page (styled nicely with green/black theme)
            document.write(`
                <div style="
                    background-color: #080C14;
                    color: #F8FAFC;
                    height: 100vh;
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    font-family: 'Inter', sans-serif;
                    text-align: center;
                    padding: 20px;
                ">
                    <div style="
                        width: 70px;
                        height: 70px;
                        background-color: rgba(255, 93, 93, 0.1);
                        border-radius: 50%;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        margin-bottom: 24px;
                        border: 1px solid rgba(255, 93, 93, 0.2);
                    ">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#FF5D5D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <h1 style="
                        font-family: 'Outfit', sans-serif;
                        color: #FF5D5D;
                        font-size: 2.5rem;
                        margin-bottom: 12px;
                        font-weight: 700;
                    ">Acceso denegado.</h1>
                    <p style="
                        color: #94A3B8;
                        font-size: 1.1rem;
                        margin-bottom: 30px;
                        max-width: 400px;
                        line-height: 1.5;
                    ">No tienes los permisos necesarios para acceder al Panel de Administración.</p>
                    <a href="../" style="
                        background-color: #00C853;
                        color: #000;
                        padding: 14px 28px;
                        text-decoration: none;
                        border-radius: 8px;
                        font-weight: bold;
                        font-size: 1rem;
                        transition: transform 0.2s ease, box-shadow 0.2s ease;
                        display: inline-block;
                    " onmouseover="this.style.transform='translateY(-2px)';" onmouseout="this.style.transform='none';">
                        Volver al Inicio
                    </a>
                </div>
            `);
        }
    </script>
</head>
<body style="margin:0; background-color:#080C14;">
</body>
</html>
